{{/*
Autor:   Diego Regis M. F. dos Santos
Email:   diego-f-santos@openlabs.com.br
Time:    OpenLabs - DevOps | Infra
Versão:  2.0.0
Arquivo: helm/status-report/templates/job-test.yaml
Desc:    Job de teste on-demand — disparado via "helm test" ou "make test-run"
         Usa a mesma spec do CronJob mas com hook de teste do Helm
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "status-report.fullname" . }}-test
  namespace: {{ include "status-report.namespace" . }}
  labels:
    {{- include "status-report.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: {{ .Values.cronjob.activeDeadlineSeconds }}
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "status-report.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: test
    spec:
      serviceAccountName: {{ include "status-report.serviceAccountName" . }}
      restartPolicy: Never
      automountServiceAccountToken: true

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        - name: reports
          emptyDir: {}
        - name: cache
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      containers:
        - name: test
          image: {{ include "status-report.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # Roda sem enviar notificações — apenas gera o PDF e valida a coleta
          args:
            - "--no-notify"

          envFrom:
            - configMapRef:
                name: {{ include "status-report.fullname" . }}-config

          env:
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "status-report.smtpSecretName" . }}
                  key: smtp-user
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "status-report.smtpSecretName" . }}
                  key: smtp-password
                  optional: true
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          volumeMounts:
            - name: reports
              mountPath: {{ .Values.config.outputDir }}
            - name: cache
              mountPath: {{ .Values.config.cacheDir }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
